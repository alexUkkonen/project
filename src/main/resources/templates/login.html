<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; margin-top: 100px; background: #f4f7f6; }
        .form-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px;}
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer;}
        button:hover { background: #2980b9; }
        .message { text-align: center; font-size: 0.9em; margin-bottom: 15px; }
        .error { color: #e74c3c; }
        .success { color: #2ecc71; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>Welcome Back</h2>
        
        <div th:if="${param.error}" class="message error">
            Invalid username or password.
        </div>
        
        <div th:if="${param.logout}" class="message success">
            You have been logged out.
        </div>

        <form action="/login" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            
            <input type="text" name="username" placeholder="Username" required autofocus>
            <input type="password" name="password" placeholder="Password" required>
            
            <button type="submit">Log In</button>
        </form>
        
        <p style="text-align: center; font-size: 0.9em; margin-top: 20px;">
            <a href="/forgot-password" style="color: #e74c3c; text-decoration: none;">Forgot Password?</a>
            <br><br>
            
            Don't have an account? <br>
            <a href="/register" style="color: #3498db; text-decoration: none; font-weight: bold;">Register here</a>
        </p>
    </div>
</body>
</html>
