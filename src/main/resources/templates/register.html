<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; margin-top: 100px; background: #f4f7f6; }
        .form-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px;}
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer;}
    </style>
</head>
<body>
    <div class="form-box">
        <h2>Create Account</h2>
        <form action="/register" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email Address" required> <input type="url" name="moodleUrl" placeholder="Your Moodle iCal URL" required> <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirmPassword" placeholder="Confirm Password" required> <div th:if="${param.error}" style="color: red; margin-bottom: 10px; font-size: 0.9em;">
                <span th:text="${param.error}">Error message</span>
            </div>

            <button type="submit">Register</button>
        </form>
        <p style="text-align: center; font-size: 0.9em;">
            <a href="/login">Already have an account? Login</a>
        </p>
    </div>
</body>
</html>
