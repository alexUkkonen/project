<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Enter New Password</title>
    <style>body { font-family: sans-serif; display: flex; justify-content: center; margin-top: 100px; background: #f4f7f6; } .form-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px;} input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; } button { width: 100%; padding: 10px; background: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer;}</style>
</head>
<body>
    <div class="form-box">
        <h2>New Password</h2>
        
        <div th:if="${param.error}" style="color: #e74c3c; font-size: 0.9em; margin-bottom: 10px; text-align: center;">
            <span th:text="${param.error}"></span>
        </div>

        <form action="/reset-password" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" name="token" th:value="${param.token}" /> <input type="password" name="password" placeholder="New Password" required>
            <input type="password" name="confirmPassword" placeholder="Confirm Password" required>
            
            <button type="submit">Update Password</button>
        </form>
    </div>
</body>
</html>
