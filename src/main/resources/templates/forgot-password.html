<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password</title>
    <style>body { font-family: sans-serif; display: flex; justify-content: center; margin-top: 100px; background: #f4f7f6; } .form-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px;} input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; } button { width: 100%; padding: 10px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer;}</style>
</head>
<body>
    <div class="form-box">
        <h2>Reset Password</h2>
        
        <div th:if="${message}" th:text="${message}" style="color: #2ecc71; font-size: 0.9em; margin-bottom: 10px;"></div>
        <div th:if="${error}" th:text="${error}" style="color: #e74c3c; font-size: 0.9em; margin-bottom: 10px;"></div>

        <form action="/forgot-password" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="email" name="email" placeholder="Enter your email" required>
            <button type="submit">Send Reset Link</button>
        </form>
        <p style="text-align: center; font-size: 0.9em;"><a href="/login">Back to Login</a></p>
    </div>
</body>
</html>
